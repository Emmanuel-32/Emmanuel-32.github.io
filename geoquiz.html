        <!-- WELCOME SCREEN -->
<div id="welcomeScreen" style="text-align: center;">
<h1>Geography Quiz</h1>
<p>
Test your knowledge of U.S. state capitals!
You will be given a state, and your job is to type in its capital.
</p>
<button onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ CONTENT (hidden at start) -->
<div id="quizContainer" style="text-align: center; display: none;">

<h2 id="question"></h2>

<input id="answerInput" type="text" placeholder="Enter your answer">

<br><br>

<button onclick="checkAnswer()">Submit Answer</button>

<p id="feedback"></p>

<p id="score">Correct Answers: 0</p>
</div>

    <script>
        let quizData = [{state: "Texas",capital: "Austin"},
                        {state: "California",capital: "Sacramento"},
                        {state: "New York",capital: "Albany"},
                        {state: "Illinois",capital: "Springfield"}
        ];

        let currentQuestion = 0;
        let correctCount = 0;

        function loadQuestion(){
            let stateName = quizData[currentQuestion].state;
            document.getElementById("question").innerText = "What is the capital of " + stateName + "?";
            
                }
        function checkAnswer(){
            let correctAnswer = quizData[currentQuestion].capital;
            let userAnswer = document.getElementById("answerInput").value;

            if(userAnswer === correctAnswer){
                document.getElementById("feedback").innerText = "Correct!";
                correctCount++;
            }else{
                document.getElementById("feedback").innerText = "Incorrect, correct answer was:"+ correctAnswer;
            }
            //Update score
            document.getElementById("Score").innerText = "Correct Answers:" + correctCount;
            //Clear input
            document.getElementById("answerInput").value = "Enter your answer";
            //Advance question
            currentQuestion++;
            if(currentQuestion < quizData.length){
                loadQuestion();
            }else{
                document.getElementById("question").innerText = "Quiz Complete!"
            }
        }
        function startQuiz(){
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("quizContainer").style.display = "block";
            loadQuestion();

        }

    </script>
